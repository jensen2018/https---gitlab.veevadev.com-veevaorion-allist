<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Veeva Orion CRM</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimal-ui" />
    <meta name="apple-mobile-web-app-status-bar-style" content="yes" />

    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="./iconfont.css" />
    <script src="//cdn.bootcss.com/jquery/3.0.0-beta1/jquery.min.js"></script>
    <script src="jquery.tmpl.min.js"></script>
    <script src="../common.js"></script>
    <script src="app.js"></script>
</head>

<body>
    <div class="head-main">
        <div class="panel-default">
            <span class="head-left">
                <div class="current-info">
                    <span class="share-user-name">
                        <span class="current-user-name" id="username"></span>
                        <i class="icon-event-owner"></i>
                    </span>
                    <div class="attendee-count-label" id="positionname"></div>
                </div>
            </span>
            <span class="head-right editable" id="editable">
                <div class="btn-group">
                    <button id="add-button">
                        <span>添加成本中心</span>
                    </button>
                </div>
            </span>
        </div>
        <div class="seleted-data" id="viewdata"></div>
    </div>
    <div class="select-main" style="display:none">
        <div class="add-account-dialog">
<!--            <div class="page-header">-->
<!--                <div class="page-title">添加成本中心</div>-->
<!--            </div>-->
            <div class="search-contain">
                <div class="search-condition">
                    <div class="no-label-row">
                        <form name="lookup-form">
                            <span class="lookup-search-btn">搜索</span>
                            <div class="left-input">
                                <input name="query" id="query" class="lookup-search-input" type="text" placeholder="点击搜索，在全部数据中查找">
                            </div>
                        </form>
                    </div>
                </div>
                <div class="layout-data"></div>
            </div>
            <div class="orion-layout-bottom">
                <div class="page-footer">
                    <div class="bottom-btn-bar">
                        <span class="btn-wrap">
                            <a class="btn" id="cancel-btn">
                                <span class="icon iconfont icon-cancel"></span>
                                <span class="icon-text">取消</span>
                            </a>
                        </span>
                        <span class="btn-wrap">
                            <a class="btn" id="confirm-btn">
                                <span class="icon iconfont icon-confirm"></span>
                                <span class="icon-text">确认</span>
                            </a>
                        </span>
                    </div>
                </div>
            </div>
            <div class="search-data">
                <div class="search-data-item" id="searchdata"></div>
                <div class="orion-scroll-loading">
                    <div class="loading-html-message">
                        <div class="load-line">
                            <div class="load-no-data-message">没有更多数据了</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/x-jquery-tmpl" id="view-data">
        <li class="view-data" id ="${id}">
            <div class="view-item">
                <div class="item-title">
                    <div class="title">成本中心</div>
                    <div class="item-name">${name}</div>
                </div>
                <div class="item-data">
                    <span class="title">比例(%)</span>
                    <span class="item-rate">${rate}</span>
                    <input type="number" class="input" style="display:none" placeholder="请输入0-100之间数字">
                    <span class="error-data" style="display:none,color:red"></span>
                </div>
                <div class="item-action">
                    <div class="view-action">
                        <span class="delete-btn action editable">删除</span>
                        <span class="edit-btn action editable">编辑</span>
                    </div>
                    <div class="edit-action" style="display:none">
                        <span class="save-btn action">保存</span>
                        <span class="cancel-btn action">取消</span>
                    </div>
                </div>
            </div>
         </li>
    </script>

    <script type="text/x-jquery-tmpl" id="search-data">
        <li id ="${id}">
            <div class="search-item">
                <div class="search-item-title">
                    <div class="search-item-name">${name}</div>
                 </div>
                 <input type="checkbox" class="checkbox">
            </div>
         </li>
    </script>

</body>
</html>
