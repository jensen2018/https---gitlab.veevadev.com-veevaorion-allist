<script src="js/mibble_opt.js"></script>
<script>
   
    var titleData = [];
    var newMibble;
    CustomPageUtils.getDataByMethodName('index',function(response) {
        if (response.length === 0) {
            alert('无配置数据');
        } else {
            titleData = response;

            newMibble = new mibble(titleData);
            newMibble.showtype();

            newMibble.compute();
            $(window).resize(function () {
                newMibble.compute();
            });
        
        }
            
    });

    $('.middle-content-main').on('click', '.li-action', function () {
        var key = $(this).attr('data-key');
        var id = $(this).attr('data-id');
        var name = $(this).attr('data-name');
        $(this).toggleClass('active')
        newMibble.optAction(key, id, name);
    });


    $('.middle-btn').on('click',function () {
        //返回的数据
        CustomPageUtils.saveDataByMethodWithParams('save', newMibble.list, function(response) {

            alert(response.message);

        });
    })

</script>
