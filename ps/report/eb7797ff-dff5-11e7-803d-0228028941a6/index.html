<script type="text/x-jquery-tmpl" id="report-tmpl">
    
    <div class="report-item">

        <p class="report-item-data">${data}</p>
        {{else}}
        <p class="report-item-data report-size">${data}</p>
        {{/if}}
        <span class="report-item-label">${label}</span>
    </div>
</script>
