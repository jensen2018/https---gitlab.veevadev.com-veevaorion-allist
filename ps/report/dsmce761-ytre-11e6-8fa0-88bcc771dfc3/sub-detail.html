<html>
<head>
    <meta charset="utf-8" />
    <title>Veeva Orion CRM</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimal-ui" />
    <meta name="apple-mobile-web-app-status-bar-style" content="yes" />

    <link rel="stylesheet" href="detail.css" />
    <link rel="stylesheet" type="text/css" href="drop-down.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css">

</head>
    
<body>
    <div class="report-detail-header">
        <span id="reportName">销量统计</span>
        <span id="position_id" style="display: none"></span>
        <a id="goHome" class="home-link"><span class="home-icon"></span></a>
    </div>
    
    <div class="report-analysis">
        <div class="report-container report-board">
            <div class="filter">
                <div class="filter-left">
                    <span class="filter-item" id="time"> </span>
                    <span class="filter-item" id="product" proId tplData> </span>
                </div>
                <div class="filter-right">
                    <p>
                        <button class="btn1">金额</button>
                        <button class="btn2 active">数量</button>
                    </p>
                </div>
                
            </div> 
            <div class="report-customer">
                <div class="flex-left">
                    <span class="month-time datatime" id="datetime">
                        -
                    </span>
                    <span class="message" >
                        <label id="message">-</label>
                        <label class="message-text">万元</label>
                    </span>
                </div>
                <div class="flex-right">
                    <div class="data-span">
                        <div class="data-title">
                            同比
                        </div>
                        <span class="data-number" id="actual">
                            --
                        </span>
                    </div>
                    <span class="xl-line"></span>
                    <span class="xl-line-left"></span>
                    <div class="data-span">
                        <div class="data-title">
                            环比
                        </div>
                        <span class="data-number" id="target">
                            --
                        </span>
                    </div>
                    <span class="xl-line-1"></span>
                    <div class="data-span">
                        <div class="data-title">
                            A/T
                        </div>
                        <span class="data-number" id="reach">
                            --
                        </span>
                    </div>
                </div>
                <span class="border-bottom"></span>
            </div>
            <div class="report-customer">
                <div class="flex-left">
                    <span class="quarter-time datatime " id="quartertime">
                        -
                    </span>
                    <span class="message" >
                        <label id="quarter-number">-</label>
                        <label class="message-text">万元</label>
                    </span>
                </div>
                <div class="flex-right">
                    <div class="data-span">
                        <div class="data-title">
                            同比
                        </div>
                        <span class="data-number" id="quarter-contrast-data">
                            --
                        </span>
                    </div>
                    <span class="xl-line"></span>
                    <span class="xl-line-left"></span>
                    <div class="data-span">
                        <div class="data-title">
                            环比
                        </div>
                        <span class="data-number" id="quarter-loop-data">
                            --
                        </span>
                    </div>
                    <span class="xl-line-1"></span>
                    <div class="data-span">
                        <div class="data-title">
                            A/T
                        </div>
                        <span class="data-number" id="quarter-reach">
                            --
                        </span>
                    </div>
                </div>
                <span class="border-bottom"></span>
            </div>
            <div class="report-customer">
                <div class="flex-left">
                    <span class="year-time datatime " id="ytdtime">
                        -
                    </span>
                    <span class="message" >
                        <label id="year-number">-</label>
                        <label class="message-text">万元</label>
                    </span>
                </div>
                <div class="flex-right">
                    <div class="data-span">
                        <div class="data-title">
                            同比
                        </div>
                        <span class="data-number" id="year-contrast-data">
                            --
                        </span>
                    </div>
                    <span class="xl-line"></span>
                    <span class="xl-line-left"></span>
                    <div class="data-span">
                        <div class="data-title">
                            环比
                        </div>
                        <span class="data-number" id="year-loop-data">
                            --
                        </span>
                    </div>
                    <span class="xl-line-1"></span>
                    <div class="data-span">
                        <div class="data-title">
                            A/T
                        </div>
                        <span class="data-number" id="year-reach">
                            --
                        </span>
                    </div>
                </div>
                <span class="border-bottom"></span>
            </div>
        </div>
    </div>

<!--        <div class="comment">提示：显示值已四舍五入</div>-->

<!-- echatrs -->
    <div id="rankList">
        
    </div>

    <div class="report-analysis">
        <ul class="tab" style="display:none">
            <li class="tab-bar tabBorder" id="li-suborder">下属列表</li>
            <li class="tab-bar" id="li-hospital">医院列表</li>
        </ul>
        <div class="tab-suborder" id="tab-suborder">

        </div>
        <div class="tab-hospital" id="tab-hospital">

        </div>
    </div>

    <script type="text/x-jquery-tmpl" id="tabSuborder">
        <li class="tab-detail tab-detail_sub" datetime="${this_month['date']}" product_id="${package_id}" position_id="${position_id}">
            <div class="tab_rep">
                <div class="title">
                    <span class="title_name">${username}</span>
                    <span class="title_name">${positionname}</span>
                    <span class="title_link"> > </span>
                </div>
                <div class="tab_header">
                    <span class="time_data">时间周期</span>
                    <span class="number">销量(万元)</span>
                    <span class="year_growth">同比</span>
                    <span class="month_growth">环比</span>
                </div>
                <div class="tab_month">
                        <span class="time_data">${this_month['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_month['amount']}
                                    </label>
                        </span>
                        <span class="year_growth">${this_month['year_growth']}</span>
                        <span class="month_growth">${this_month['month_growth']}</span>
                </div>
                <div class="tab_quarter">
                        <span class="time_data">${this_quarter['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_quarter['amount']}
                                    </label>
                        </span>
                        <span class="year_growth">${this_quarter['year_growth']}</span>
                        <span class="month_growth">${this_quarter['month_growth']}</span>
                </div>
                <div class="tab_year">
                        <span class="time_data">${this_year['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_year['amount']}
                                    </label>
                        </span>
                        <span class="year_growth">${this_year['year_growth']}</span>
                        <span class="month_growth">${this_year['month_growth']}</span>
                </div>
            </div>
        </li>

    </script>

    <script type="text/x-jquery-tmpl" id="tabHospital">
        <li class="tab-detail tab-detail_hos" hospital_id ="${id}" datetime="${this_month['date']}" product_id="${product}">
            <div class="tab_hospital">
                <div class="title">
                    <span class="title_name">${name}</span>
                    <span class="title_link"> > </span>
                </div>
                <div class="tab_header">
                    <span class="time_data">时间周期</span>
                    <span class="number">销量(万元)</span>
                    <span class="year_growth">同比</span>
                    <span class="month_growth">环比</span>
                </div>
                <div class="tab_month">
                        <span class="time_data">${this_month['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_month['amount']}
                                    </label>
                        </span>
                            <span class="year_growth">${this_month['year_growth']}</span>
                        <span class="month_growth">${this_month['month_growth']}</span>
                </div>
                <div class="tab_quarter">
                        <span class="time_data">${this_quarter['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_quarter['amount']}
                                    </label>
                        </span>
                        <span class="year_growth">${this_quarter['year_growth']}</span>
                        <span class="month_growth">${this_quarter['month_growth']}</span>
                </div>
                <div class="tab_year">
                        <span class="time_data">${this_year['date']}</span>
                        <span class="number">
                                <label class="an-number">
                                        ${this_year['amount']}
                                    </label>
                        </span>
                        <span class="year_growth">${this_year['year_growth']}</span>
                        <span class="month_growth">${this_year['month_growth']}</span>
                </div>
            </div>
        </li>
    </script>


    <script src="//s3.cn-north-1.amazonaws.com.cn/veevacdn/jquery/3.0.0-beta1/jquery.min.js"></script>
    <script src="jquery.tmpl.min.js"></script>
    <script src="//s3.cn-north-1.amazonaws.com.cn/veevacdn/echarts/3.2.3/echarts.js"></script>
    <script src="../common.js"></script>
    <!--<script src="drop-down.js"></script>-->
    <!--<script src="detail.js"></script>-->
    <script src="sub-drop-down.js"></script>
    <script src="sub-detail.js"></script>
    
</body>
</html>
