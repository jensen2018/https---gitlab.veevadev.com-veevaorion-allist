<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>销量</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimal-ui" />
    <meta name="apple-mobile-web-app-status-bar-style" content="yes" />

    <link rel="stylesheet" href="app.css" />
    <script src="//s3.cn-north-1.amazonaws.com.cn/veevacdn/jquery/3.0.0-beta1/jquery.min.js"></script>
    <script src="../common.js"></script>
    <script src="app.js"></script>
</head>

<body>
    <div class="report-analysis" id="report-subpage">
        <div class="app-content-loading">
           <img class="Rotation" src="../img/report-loading.png">
        </div>
        <div class="report-title-black">
            <span id="report-name"></span>
            <span class="report-link"> > </span>
        </div>
        <div class="report-customer">
            <div class="flex-left">
                <span class="target-icon target-unfinished">
                    数量
                </span>
                <span class="message" id="amount">
                    -
                </span>
            </div>
            <div class="flex-right">
                <span class="xl-line"></span>
                <span class="xl-line-left"></span>
                <div class="data-span">
                    <div class="data-title">
                        同比
                    </div>
                    <span class="data-number" id="year_growth">
                        <label>+</label><label>--</label>
                    </span>
                </div>
                <div class="data-span">
                    <div class="data-title">
                        环比
                    </div>
                    <span class="data-number" id="month_growth">
                        <label>-</label><label>--</label>
                    </span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
